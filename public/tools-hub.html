    .output { margin-top: 10px; padding: 10px; background: #000; border-radius: 8px; font-family: monospace; font-size: 0.8rem; max-height: 150px; overflow-y: auto; color: #0f0; display: none; }
    .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; }

    .filter-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

    async function initPyodide() {
      const statusEl = document.getElementById('status');
      const progressEl = document.getElementById('progress');
      const progressFill = document.getElementById('progressFill');
      
      try {
        progressEl.classList.add('active');
        progressFill.style.width = '10%';
        
        pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/'
        });
        
        progressFill.style.width = '50%';
        
        const packages = ['requests', 'beautifulsoup4', 'html.parser', 'json', 're', 'urllib.parse', 'uuid', 'hashlib', 'hmac', 'secrets', 'math', 'random', 'datetime', 'time', 'collections', 'itertools', 'functools', 'typing'];
        await pyodide.loadPackage(packages);
        
        progressFill.style.width = '90%';
        
        statusEl.className = 'status ready';
        statusEl.innerHTML = '✓ Pyodide Ready - Python 3.11 loaded with 18 packages';
        
        setTimeout(() => {
          progressEl.classList.remove('active');
        }, 1000);
        
        loadedCount = TOOLS_DATA.length;
        document.getElementById('totalTools').textContent = TOOLS_DATA.length;
        document.getElementById('loadedTools').textContent = loadedCount;
        
        renderTools();
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.innerHTML = '✗ Error: ' + error.message;
        console.error(error);
      }
    }

    function renderTools() {
      const grid = document.getElementById('toolsGrid');
      grid.innerHTML = filteredTools.map(tool => `
        <div class="tool-card" data-id="${tool.id}" data-type="${tool.type}" data-category="${tool.category}">
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.desc}</div>
          <div class="tool-meta">
            <span class="badge badge-${tool.category}">${tool.category.toUpperCase()}</span>
            <span class="badge badge-size">${tool.size}</span>
          </div>
          <button class="run-btn" onclick="runTool('${tool.id}')" ${!pyodide ? 'disabled' : ''}>
            ${pyodide ? '▶ Run Tool' : 'Loading...'}
          </button>
          <div id="output-${tool.id}" class="output"></div>
        </div>
      `).join('');
    }

    async function runTool(toolId) {
      const tool = TOOLS_DATA.find(t => t.id === toolId);
      if (!tool || !pyodide) return;

      const outputEl = document.getElementById(`output-${toolId}`);
      outputEl.style.display = 'block';
      outputEl.innerHTML = '<span style="color:#ffc107">Loading source...</span>';

      try {
        let code;
        try {
          const response = await fetch(tool.file);
          if (!response.ok) throw new Error('File not found');
          code = await response.text();
        } catch (fetchError) {
          outputEl.innerHTML = `<span style="color:#ff4444">Source not available in web context.\nThis tool requires server-side execution.</span>`;
          return;
        }

        outputEl.innerHTML = '<span style="color:#ffc107">Executing Python...</span>';

        pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
`);

        await pyodide.runPythonAsync(code);

        const stdout = pyodide.runPython('sys.stdout.getvalue()');
        const stderr = pyodide.runPython('sys.stderr.getvalue()');

        outputEl.innerHTML = '';
        if (stdout) {
          outputEl.innerHTML += `<pre style="white-space:pre-wrap;word-break:break-all">${escapeHtml(stdout)}</pre>`;
        }
        if (stderr) {
          outputEl.innerHTML += `<span style="color:#ffc107">${escapeHtml(stderr)}</span>`;
        }
        if (!stdout && !stderr) {
          outputEl.innerHTML += '<span style="color:#00ff88">✓ Executed successfully (no output)</span>';
        }
      } catch (error) {
        outputEl.innerHTML = `<span style="color:#ff4444">Error: ${escapeHtml(error.message)}</span>`;
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function filterTools() {
      const search = document.getElementById('searchBox').value.toLowerCase();
      const activeTab = document.querySelector('.filter-tab.active').textContent.toLowerCase();
      
      filteredTools = TOOLS_DATA.filter(tool => {
        const matchesSearch = tool.name.toLowerCase().includes(search) || tool.desc.toLowerCase().includes(search);
        const matchesCategory = activeTab === 'all' || tool.category === activeTab;
        return matchesSearch && matchesCategory;
      });
      renderTools();
    }

    function filterByType(type) {
      document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      filterTools();
    }

    tools = TOOLS_DATA;
    filteredTools = TOOLS_DATA;
