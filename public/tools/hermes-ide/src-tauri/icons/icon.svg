<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141B26"/>
      <stop offset="100%" stop-color="#0B0F14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9bb0e8"/>
      <stop offset="100%" stop-color="#6b82cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- H letter — filled rounded rects -->
  <g fill="url(#accent)">
    <!-- Left vertical -->
    <rect x="155" y="128" width="36" height="256" rx="18"/>
    <!-- Right vertical -->
    <rect x="321" y="128" width="36" height="256" rx="18"/>
    <!-- Crossbar -->
    <rect x="155" y="238" width="202" height="36" rx="18"/>
  </g>

  <!-- Left wing — three feather strokes fanning from upper-left of H -->
  <g fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <path d="M152,210 Q100,170 62,128"/>
    <path d="M152,238 Q92,218 52,190"/>
    <path d="M152,266 Q96,264 56,252"/>
  </g>

  <!-- Right wing — mirrored -->
  <g fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <path d="M360,210 Q412,170 450,128"/>
    <path d="M360,238 Q420,218 460,190"/>
    <path d="M360,266 Q416,264 456,252"/>
  </g>
</svg>
