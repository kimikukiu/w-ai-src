name: Feature Request
description: Suggest a new feature for Hermes IDE
labels: [feature-request, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Hermes IDE is intentionally minimal. Please read our [Design Principles](https://github.com/hermes-hq/hermes-ide/blob/main/DESIGN_PRINCIPLES.md) before submitting.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the pain point, not the solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered? Could this be a plugin/extension instead of core?
    validations:
      required: true
  - type: checkboxes
    id: alignment
    attributes:
      label: Design Principles Alignment
      options:
        - label: This benefits 80%+ of users (not just my use case)
          required: true
        - label: This cannot reasonably be an extension/plugin
          required: true
        - label: I have read the Design Principles
          required: true
